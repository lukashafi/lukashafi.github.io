<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Tako's Wardrobe — სოციალური ლინკები" />
  <title>Tako's Wardrobe | ლინკები</title>

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#3b0764;
      --card:rgba(255,255,255,.10);
      --card-border:rgba(255,255,255,.18);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --accent:#a78bfa;
      --ring:rgba(167,139,250,.55);
      --radius:24px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans";
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(167,139,250,.35), transparent 60%),
        radial-gradient(1000px 700px at 90% 20%, rgba(34,211,238,.22), transparent 55%),
        radial-gradient(900px 650px at 50% 95%, rgba(236,72,153,.18), transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 16px;
    }

    .wrap{ width:100%; max-width:520px; }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }

    .header{
      padding:26px 22px 18px;
      text-align:center;
      position:relative;
    }

    .header:before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(600px 180px at 50% 0%, rgba(167,139,250,.30), transparent 70%);
      pointer-events:none;
    }

    .brand{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:110px;
      height:110px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
      background:rgba(255,255,255,.08);
      display:block;
      object-fit:cover;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
    }

    h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
      letter-spacing:.2px;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }

    .links{
      padding:14px 18px 18px;
      display:grid;
      gap:12px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width:100%;
      padding:14px 14px;
      border-radius:18px;
      color:var(--text);
      text-decoration:none;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      transition: transform .15s ease, background-color .15s ease, border-color .15s ease;
      outline:none;
    }

    .btn .left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .btn .label{
      font-size:16px;
      font-weight:650;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn .meta{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.28);
    }

    .btn:focus-visible{
      box-shadow: 0 0 0 4px var(--ring);
    }

    .icon{
      width:36px;
      height:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      flex:0 0 auto;
    }

    .icon svg{ width:18px; height:18px; fill:currentColor; opacity:.92; }

    .btn-facebook .icon{ color:#e9d5ff; background: rgba(59,130,246,.18); border-color: rgba(59,130,246,.22); }
    .btn-instagram .icon{ color:#ffe4e6; background: rgba(236,72,153,.18); border-color: rgba(236,72,153,.22); }
    .btn-tiktok .icon{ color:#cffafe; background: rgba(34,211,238,.14); border-color: rgba(34,211,238,.20); }

    .arrow{ opacity:.85; flex:0 0 auto; }
    .arrow svg{ display:block; }

    .footer{
      padding:14px 18px 18px;
      border-top:1px solid rgba(255,255,255,.12);
      color:rgba(255,255,255,.62);
      font-size:12px;
      text-align:center;
    }

    .footer a{ color:rgba(255,255,255,.78); text-decoration:none; }
    .footer a:hover{ text-decoration:underline; }

    @media (prefers-reduced-motion: reduce){
      .btn{ transition:none; }
      .btn:hover{ transform:none; }
    }

    @media (max-width: 360px){
      .links{ padding-left:14px; padding-right:14px; }
      .header{ padding-left:16px; padding-right:16px; }
      h1{ font-size:24px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Tako's Wardrobe links">
      <header class="header">
        <div class="brand">
          <img src="logo.png" alt="Tako's Wardrobe ლოგო" class="logo" />
          <div>
            <h1>Tako's Wardrobe</h1>
            <p class="subtitle">მოგესალმები — აი ჩემი სოციალური ლინკები</p>
          </div>
        </div>
      </header>

      <nav class="links" aria-label="სოციალური ქსელები">
        <a class="btn btn-facebook" href="https://www.facebook.com/profile.php?id=61579124152946" target="_blank" rel="noopener noreferrer">
          <span class="left">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.8-1.6 1.5V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/></svg>
            </span>
            <span>
              <span class="label">Facebook</span>
              <span class="meta">გვერდი / პოსტები</span>
            </span>
          </span>
          <span class="arrow" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 7l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <a class="btn btn-instagram" href="#" target="_blank" rel="noopener noreferrer">
          <span class="left">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 6.2A3.8 3.8 0 1 0 15.8 12 3.8 3.8 0 0 0 12 8.2zm6.4-.9a1 1 0 1 1-1-1 1 1 0 0 1 1 1z"/></svg>
            </span>
            <span>
              <span class="label">Instagram</span>
              <span class="meta">ფოტოები / სტორი</span>
            </span>
          </span>
          <span class="arrow" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 7l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>

        <a class="btn btn-tiktok" href="https://www.tiktok.com/@takos.wardrobe?is_from_webapp=1&sender_device=pc" target="_blank" rel="noopener noreferrer">
          <span class="left">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M14 3v10.2a3.8 3.8 0 1 1-3-3.7V7.2a7 7 0 1 0 6 6.9V8.3c1.3 1.2 3 2 5 2.1V7.3c-2.8-.2-5-2.4-5-4.3H14z"/></svg>
            </span>
            <span>
              <span class="label">TikTok</span>
              <span class="meta">ვიდეოები / ტრენდები</span>
            </span>
          </span>
          <span class="arrow" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 7l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>
      </nav>

      <footer class="footer">
        <div>© <span id="y">2026</span> Tako's Wardrobe • <a href="https://takoswardrobe.app" target="_blank" rel="noopener noreferrer">takoswardrobe.app</a></div>
      </footer>
    </section>
  </main>

  <script>
    (function(){
      var el = document.getElementById('y');
      if (el) el.textContent = String(new Date().getFullYear());
    })();
  </script>
</body>
</html>
