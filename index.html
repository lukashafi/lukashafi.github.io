<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luka Shafi | ჩემი ლინკები</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .container {
            margin-top: 50px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        img.profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        p {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .link-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border: 2px solid white;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .link-btn:hover {
            background-color: white;
            color: #764ba2;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- შეგიძლია შეცვალო სურათის ლინკი შენი ფოტოთი -->
    <img src="https://avatars.githubusercontent.com/lukashafi" alt="Luka Shafi" class="profile-pic">
    
    <h1>ლუკა შაფი</h1>
    <p>თსუ-ს სტუდენტი 🎓</p>

    <!-- აქ ჩასვი შენი რეალური ლინკები # სიმბოლოს ნაცვლად -->
    <a href="#" class="link-btn" target="_blank">📘 Facebook</a>
    <a href="#" class="link-btn" target="_blank">📸 Instagram</a>
    <a href="#" class="link-btn" target="_blank">🎵 TikTok</a>
    <a href="https://github.com/lukashafi" class="link-btn" target="_blank">💻 GitHub</a>
</div>

</body>
</html>
